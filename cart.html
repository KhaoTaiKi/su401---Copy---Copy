<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Canteen Connect</title>
    <link rel="stylesheet" href="src/css/phone-frame.css">
    <link rel="stylesheet" href="src/css/cart-style.css">
</head>
<body>
    <div class="phone-frame">
        <div class="screen-container">
            <header class="cart-header">
                <button class="back-btn" onclick="location.href='menu.html'">←</button>
                <h3>รายการที่เลือก</h3>
                <div style="width: 30px;"></div>
            </header>

            <div class="cart-content">
                <div id="cart-items-list"></div>
                
                <div class="payment-section shop-group-container">
                    <div class="shop-group-header">💰 วิธีการชำระเงิน</div>
                    <div class="dining-options">
                        <button class="option-btn active" id="pay-cash" onclick="selectPayment('เงินสด')">เงินสด</button>
                        <button class="option-btn" id="pay-prompt" onclick="selectPayment('PromptPay')">PromptPay</button>
                    </div>
                </div>
            </div>

            <footer class="cart-footer">
                <div class="summary-row">
                    <span>ยอดรวมทั้งหมด</span>
                    <h2 id="total-price">0.-</h2>
                </div>
                <button class="confirm-btn" onclick="confirmOrder()">ชำระเงินและสั่งซื้อ</button>
            </footer>

            <div id="success-overlay" class="modal-overlay">
                <div class="success-modal">
                    <div class="success-icon">✅</div>
                    <h2 id="success-msg">ชำระเงินสำเร็จ!</h2>
                    <p>ระบบกำลังพาคุณไปหน้าติดตามอาหาร</p>
                    <button class="modal-btn" onclick="goToStatus()">ตกลง</button>
                </div>
            </div>
        </div>
    </div>
    <script src="src/js/cart-logic.js"></script>
</body>
</html>
